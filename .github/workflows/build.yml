name: Build & Release (macOS)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:   # allow manual trigger

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Step 1: Build the Python backend sidecar on each architecture ───────────
  build-python-sidecar:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-13          # Intel (x86_64)
            target: x86_64-apple-darwin
          - os: macos-14          # Apple Silicon (arm64)
            target: aarch64-apple-darwin

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system deps (FFmpeg)
        run: brew install ffmpeg

      - name: Install Python deps
        run: |
          pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pyinstaller
          # AI/ML packages (commented out in requirements.txt, required for sidecar)
          pip install faster-whisper whisperx demucs || echo "some AI packages failed, continuing"
          # essentia — optional BPM detection
          pip install essentia || echo "essentia not available for this arch, skipping"

      - name: Build sidecar with PyInstaller
        run: |
          pyinstaller backend/backend.spec --distpath dist-backend

      - name: Upload sidecar artifact (full onedir)
        uses: actions/upload-artifact@v4
        with:
          name: sidecar-${{ matrix.target }}
          path: dist-backend/backend/
          retention-days: 1

  # ── Step 2: Build Tauri app for each architecture ───────────────────────────
  build-tauri:
    needs: build-python-sidecar
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            sidecar: sidecar-aarch64-apple-darwin
            dmg_suffix: arm64
          - os: macos-13
            target: x86_64-apple-darwin
            sidecar: sidecar-x86_64-apple-darwin
            dmg_suffix: x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Rust (stable)
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source "$HOME/.cargo/env"
          rustup target add ${{ matrix.target }}

      - name: Download backend sidecar
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.sidecar }}
          path: frontend/src-tauri/resources/backend

      - name: Make backend executable
        run: chmod +x frontend/src-tauri/resources/backend/backend

      - name: Install npm deps
        run: |
          cd frontend
          npm ci

      - name: Build Tauri app
        run: |
          source "$HOME/.cargo/env"
          cd frontend
          npm run tauri build -- --target ${{ matrix.target }}

      - name: Upload .dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: UltrastarCreator-macOS-${{ matrix.dmg_suffix }}
          path: frontend/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
          if-no-files-found: warn
          retention-days: 30

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: frontend/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
